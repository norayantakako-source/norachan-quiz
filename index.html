<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>のらちゃんクイズ</title>

  <link rel="stylesheet" href="style.css">
  <script src="questions-beginner.js" defer></script>
  <script src="questions-hall.js" defer></script>
  <script src="quiz.js" defer></script>
</head>

<body>
  <div class="game">
    <h1>のらちゃんクイズ</h1>

    <div class="message" id="message">
      のらやへようこそ！<br>
      一緒にのらやを勉強しようね🐈‍⬛
    </div>

    <img
      src="Aのらノーマル.png"
      class="norachan"
      id="norachan"
      onclick="tapNora()"
      alt="のらちゃん"
    />

    <div id="topButtons">
      <button onclick="startBeginner()" id="beginnerButton">
        🌱 はじめて編
      </button>

     <button
      id="hallButton"
      onclick="startHall()"
      disabled
      >
  🔒 ホール編
   </button>

      <button onclick="showCollection()">
        🏆 バッジコレクション
      </button>
    </div>

    <div id="quizArea"></div>

    <div class="collection" id="collectionArea" style="display:none;">
      <h2>バッジコレクション</h2>

      <div class="item locked" id="beginnerBadge">
        🔒 はじめて編 未クリア
      </div>

      <div class="item locked" id="hallBadge">
        🔒 ホール編 未クリア
      </div>

      <div class="item locked" id="kitchenBadge">
        🔒 キッチン編
      </div>

      <button onclick="hideCollection()">
        🏠 トップへ戻る
      </button>
    </div>
  </div>
</body>
</html>
